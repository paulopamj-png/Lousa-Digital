<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1f2933">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lousa Digital">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icone.png">
    <title>Estúdio de Aulas — Lousa Digital</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root {
            --bg-app-2: #161c24;
            --frame-wood-1: #6b4a2b;
            --frame-wood-2: #4a3019;
            --board-green: #1f5641;
            --accent: #1a73e8;
            --accent-2: #4285f4;
            --danger: #e53935;
            --text: #e6e8eb;
            --text-muted: #9aa3ad;
            --panel: rgba(28, 33, 41, 0.92);
            --panel-border: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.45);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.35);
            --transition: all 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(ellipse at top, #2a3340 0%, var(--bg-app-2) 70%);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text); overflow: hidden;
            user-select: none; -webkit-user-select: none;
            overscroll-behavior: none;
        }

        #app {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh; width: 100vw;
        }

        /* TOPBAR */
        #topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 18px;
            background: linear-gradient(180deg, rgba(0,0,0,0.25), transparent);
            z-index: 20;
        }
        .brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 15px;
        }
        .brand .logo {
            width: 30px; height: 30px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #7c4dff);
            display: grid; place-items: center;
            box-shadow: 0 4px 14px rgba(26,115,232,0.4);
        }
        .brand .logo .material-symbols-rounded { font-size: 18px; color: white; }
        .brand .sub { color: var(--text-muted); font-weight: 500; font-size: 13px; }

        .page-pill {
            display: flex; align-items: center; gap: 4px;
            background: var(--panel); border: 1px solid var(--panel-border);
            border-radius: 999px; padding: 4px;
            box-shadow: var(--shadow-md);
        }
        .page-pill button {
            background: transparent; border: 0; color: var(--text);
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: grid; place-items: center; transition: var(--transition);
        }
        .page-pill button:hover { background: rgba(255,255,255,0.08); }
        .page-pill button:disabled { opacity: 0.3; cursor: default; }
        .page-pill .label { font-size: 13px; font-weight: 600; padding: 0 8px; min-width: 64px; text-align: center; }

        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--panel-border); color: var(--text);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: grid; place-items: center; transition: var(--transition);
            box-shadow: var(--shadow-md);
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .icon-btn.active { background: var(--accent); color: white; border-color: transparent; }

        /* STAGE */
        #stage {
            position: relative; padding: 6px 18px 12px;
            display: grid; place-items: center; min-height: 0;
        }
        #board-frame {
            position: relative; width: 100%; height: 100%;
            border-radius: 22px;
            background:
                linear-gradient(135deg, var(--frame-wood-1), var(--frame-wood-2)),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.06) 0 2px, transparent 2px 7px);
            background-blend-mode: overlay;
            padding: 18px;
            box-shadow:
                inset 0 0 0 2px rgba(255,220,180,0.08),
                inset 0 0 0 4px rgba(0,0,0,0.35),
                0 30px 60px rgba(0,0,0,0.55),
                0 6px 12px rgba(0,0,0,0.4);
        }
        #board-frame::before {
            content: ''; position: absolute; pointer-events: none; border-radius: 22px; inset: 0;
            background:
                radial-gradient(circle at 22px 22px, #2a1a0c 2px, transparent 3px),
                radial-gradient(circle at calc(100% - 22px) 22px, #2a1a0c 2px, transparent 3px),
                radial-gradient(circle at 22px calc(100% - 22px), #2a1a0c 2px, transparent 3px),
                radial-gradient(circle at calc(100% - 22px) calc(100% - 22px), #2a1a0c 2px, transparent 3px);
            opacity: 0.7;
        }
        #board-frame::after {
            content: ''; position: absolute; pointer-events: none; border-radius: 22px; inset: 0;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
        }

        #board {
            position: relative; width: 100%; height: 100%;
            border-radius: 8px; overflow: hidden;
            background: #ffffff;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.12);
            transition: background-color 0.4s ease;
        }
        #board.theme-green { background: var(--board-green); }

        canvas.layer {
            position: absolute; inset: 0; width: 100%; height: 100%;
            display: block; touch-action: none;
        }
        #bgLayer { z-index: 1; }
        #drawLayer { z-index: 2; }

        #textInput {
            position: absolute; display: none; background: transparent;
            border: 2px dashed var(--accent); padding: 4px 6px; outline: none;
            z-index: 50; border-radius: 6px; min-width: 80px;
            font-family: 'Inter', sans-serif; color: #000;
        }

        /* CAMERA PiP */
        #cameraPip {
            position: absolute; z-index: 40;
            width: 220px; height: 165px;
            border-radius: 14px; overflow: hidden;
            background: #000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.9);
            cursor: grab; display: none;
            top: 24px; right: 24px;
            transition: box-shadow 0.2s;
        }
        #cameraPip.dragging { cursor: grabbing; box-shadow: 0 16px 40px rgba(0,0,0,0.7), 0 0 0 3px var(--accent); }
        #cameraPip.shape-circle { border-radius: 50%; aspect-ratio: 1; height: auto; }
        #cameraVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; }
        .pip-handle {
            position: absolute; width: 18px; height: 18px; right: 0; bottom: 0;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.8) 50%);
            z-index: 2;
        }
        #cameraPip.shape-circle .pip-handle { display: none; }

        /* TOOLBAR */
        #toolbar {
            display: flex; justify-content: center; padding: 10px 18px 16px; z-index: 20;
        }
        .toolbar-inner {
            display: flex; align-items: center; gap: 6px;
            background: var(--panel); backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            padding: 8px 12px; border-radius: 999px;
            box-shadow: var(--shadow-lg);
            max-width: 100%; overflow-x: auto; scrollbar-width: none;
        }
        .toolbar-inner::-webkit-scrollbar { display: none; }
        .divider { width: 1px; height: 28px; background: var(--panel-border); margin: 0 4px; flex-shrink: 0; }

        .tool-btn {
            background: transparent; border: 0; color: var(--text);
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: grid; place-items: center; transition: var(--transition);
            flex-shrink: 0;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.08); }
        .tool-btn.active {
            background: rgba(26,115,232,0.18); color: var(--accent-2);
            box-shadow: inset 0 0 0 1.5px var(--accent-2);
        }
        .tool-btn .material-symbols-rounded { font-size: 22px; }

        #recordBtn {
            background: linear-gradient(135deg, #ef5350, #c62828);
            color: white; box-shadow: 0 4px 14px rgba(229,57,53,0.4);
        }
        #recordBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(229,57,53,0.55); }
        #recordBtn.recording { animation: pulse 1.6s infinite; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0   rgba(229,57,53,0.6); }
            70%  { box-shadow: 0 0 0 14px rgba(229,57,53,0);   }
            100% { box-shadow: 0 0 0 0   rgba(229,57,53,0);   }
        }

        #recTimer {
            font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px;
            color: var(--text); padding: 0 8px 0 4px; min-width: 56px; display: none;
        }
        #recTimer.visible { display: inline-block; }
        #recTimer .dot {
            display: inline-block; width: 8px; height: 8px;
            background: var(--danger); border-radius: 50%;
            margin-right: 6px; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        .color-wrap {
            position: relative; width: 36px; height: 36px; border-radius: 50%;
            overflow: hidden; cursor: pointer; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.2); transition: var(--transition);
        }
        .color-wrap:hover { transform: scale(1.08); border-color: var(--accent); }
        .color-wrap input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 60px; height: 60px; cursor: pointer; border: 0;
        }
        .color-presets { display: flex; gap: 6px; padding: 0 4px; flex-shrink: 0; }
        .color-chip {
            width: 22px; height: 22px; border-radius: 50%;
            cursor: pointer; transition: var(--transition); border: 2px solid transparent;
        }
        .color-chip:hover { transform: scale(1.15); }
        .color-chip.sel { border-color: white; box-shadow: 0 0 0 2px var(--accent-2); }

        .size-group { display: flex; align-items: center; gap: 8px; padding: 0 6px; flex-shrink: 0; }
        .size-group .material-symbols-rounded { font-size: 20px; color: var(--text-muted); }
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 90px; height: 4px; background: rgba(255,255,255,0.15);
            border-radius: 2px; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; background: var(--accent-2); border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--accent-2); border-radius: 50%;
            border: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        /* MODALS */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; place-items: center; z-index: 100; backdrop-filter: blur(6px);
        }
        .modal-backdrop.visible { display: grid; }
        .modal {
            background: #232a33; border: 1px solid var(--panel-border);
            border-radius: 18px; padding: 22px; max-width: 440px; width: calc(100% - 32px);
            box-shadow: var(--shadow-lg);
        }
        .modal h2 { margin: 0 0 16px; font-size: 18px; }
        .modal label { display: block; font-size: 13px; color: var(--text-muted); margin: 12px 0 6px; }
        .modal select {
            width: 100%; padding: 10px 12px; border-radius: 10px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border);
            color: var(--text); font-size: 14px; outline: none;
        }
        .modal select:focus { border-color: var(--accent); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .btn {
            padding: 9px 16px; border-radius: 10px; border: 0; cursor: pointer;
            font-weight: 600; font-size: 14px; transition: var(--transition); font-family: inherit;
        }
        .btn-ghost { background: transparent; color: var(--text-muted); }
        .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--text); }

        .bg-options { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 6px; }
        .bg-option {
            aspect-ratio: 4/3; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; transition: var(--transition);
            display: grid; place-items: end center; padding: 6px;
            font-size: 11px; font-weight: 600; color: #333;
        }
        .bg-option.dark { color: #fff; }
        .bg-option:hover { transform: translateY(-2px); }
        .bg-option.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

        /* TOAST */
        #toast {
            position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--panel); color: var(--text); padding: 10px 18px;
            border-radius: 999px; font-size: 13px; font-weight: 500;
            border: 1px solid var(--panel-border); box-shadow: var(--shadow-md);
            opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none;
        }
        #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* FULLSCREEN */
        body.fullscreen #topbar { display: none; }
        body.fullscreen #stage { padding: 0; }
        body.fullscreen #board-frame { border-radius: 0; padding: 28px; }
        body.fullscreen #toolbar {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 14px;
        }
        body.fullscreen #toolbar .toolbar-inner { background: rgba(20,24,30,0.85); }
        .page-pill-floating { display: none; }
        body.fullscreen .page-pill-floating {
            display: flex; position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 25; opacity: 0.6; transition: opacity 0.3s;
        }
        body.fullscreen .page-pill-floating:hover { opacity: 1; }

        @media (max-width: 760px) {
            #topbar { padding: 8px 10px; }
            .brand .sub { display: none; }
            #stage { padding: 4px 8px 8px; }
            #board-frame { padding: 10px; border-radius: 16px; }
            .toolbar-inner { padding: 6px 8px; gap: 4px; }
            .tool-btn { width: 38px; height: 38px; }
            input[type="range"] { width: 70px; }
            #cameraPip { width: 140px; height: 105px; }
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>
<div id="app">
    <header id="topbar">
        <div class="brand">
            <div class="logo"><span class="material-symbols-rounded">draw</span></div>
            <div>Estúdio de Aulas <div class="sub">Lousa Digital Profissional</div></div>
        </div>

        <div class="page-pill" id="pagePill">
            <button id="prevPageBtn" title="Página anterior"><span class="material-symbols-rounded">chevron_left</span></button>
            <span class="label" id="pageLabel">1 / 1</span>
            <button id="nextPageBtn" title="Próxima página"><span class="material-symbols-rounded">chevron_right</span></button>
            <button id="addPageBtn" title="Nova página"><span class="material-symbols-rounded">add</span></button>
        </div>

        <div class="top-actions">
            <button class="icon-btn" id="bgBtn" title="Fundo da lousa"><span class="material-symbols-rounded">grid_on</span></button>
            <button class="icon-btn" id="settingsBtn" title="Configurações"><span class="material-symbols-rounded">settings</span></button>
            <button class="icon-btn" id="fsBtn" title="Tela cheia"><span class="material-symbols-rounded">fullscreen</span></button>
        </div>
    </header>

    <main id="stage">
        <div id="board-frame">
            <div id="board">
                <canvas id="bgLayer" class="layer"></canvas>
                <canvas id="drawLayer" class="layer"></canvas>
                <input type="text" id="textInput" placeholder="Digite e tecle Enter">
            </div>
            <div id="cameraPip">
                <video id="cameraVideo" autoplay muted playsinline></video>
                <div class="pip-handle" id="pipHandle"></div>
            </div>
        </div>

        <div class="page-pill page-pill-floating" id="pagePillFs">
            <button onclick="window.app.prevPage()"><span class="material-symbols-rounded">chevron_left</span></button>
            <span class="label" id="pageLabelFs">1 / 1</span>
            <button onclick="window.app.nextPage()"><span class="material-symbols-rounded">chevron_right</span></button>
        </div>
    </main>

    <footer id="toolbar">
        <div class="toolbar-inner">
            <button class="tool-btn" id="recordBtn" title="Gravar aula">
                <span class="material-symbols-rounded" id="recordIcon">fiber_manual_record</span>
            </button>
            <span id="recTimer"><span class="dot"></span><span id="recTime">00:00</span></span>

            <div class="divider"></div>

            <button class="tool-btn active" id="micBtn" title="Microfone ligado/desligado">
                <span class="material-symbols-rounded">mic</span>
            </button>
            <button class="tool-btn" id="cameraBtn" title="Câmera ligada/desligada">
                <span class="material-symbols-rounded">videocam</span>
            </button>

            <div class="divider"></div>

            <button class="tool-btn active" data-tool="pen"         title="Caneta">      <span class="material-symbols-rounded">stylus_note</span></button>
            <button class="tool-btn"        data-tool="pencil"      title="Lápis">       <span class="material-symbols-rounded">edit</span></button>
            <button class="tool-btn"        data-tool="highlighter" title="Marca-texto"> <span class="material-symbols-rounded">ink_highlighter</span></button>
            <button class="tool-btn"        data-tool="eraser"      title="Borracha">    <span class="material-symbols-rounded">ink_eraser</span></button>
            <button class="tool-btn"        data-tool="text"        title="Texto">       <span class="material-symbols-rounded">title</span></button>
            <button class="tool-btn"        data-tool="select"      title="Selecionar">  <span class="material-symbols-rounded">select</span></button>

            <div class="divider"></div>

            <button class="tool-btn" data-tool="line"   title="Linha">      <span class="material-symbols-rounded">horizontal_rule</span></button>
            <button class="tool-btn" data-tool="rect"   title="Retângulo">  <span class="material-symbols-rounded">rectangle</span></button>
            <button class="tool-btn" data-tool="circle" title="Círculo">    <span class="material-symbols-rounded">circle</span></button>

            <div class="divider"></div>

            <div class="color-presets" id="colorPresets"></div>
            <div class="color-wrap" title="Cor personalizada">
                <input type="color" id="colorPicker" value="#1a1a1a">
            </div>

            <div class="size-group">
                <span class="material-symbols-rounded">line_weight</span>
                <input type="range" id="sizeSlider" min="1" max="80" value="4">
            </div>

            <div class="divider"></div>

            <button class="tool-btn" id="undoBtn"   title="Desfazer">   <span class="material-symbols-rounded">undo</span></button>
            <button class="tool-btn" id="redoBtn"   title="Refazer">    <span class="material-symbols-rounded">redo</span></button>

            <div class="divider"></div>

            <button class="tool-btn" id="importBtn" title="Importar imagem/PDF"> <span class="material-symbols-rounded">upload_file</span></button>
            <button class="tool-btn" id="exportBtn" title="Exportar como PNG">   <span class="material-symbols-rounded">image</span></button>
            <button class="tool-btn" id="clearBtn"  title="Limpar página">       <span class="material-symbols-rounded">delete</span></button>
        </div>
    </footer>
</div>

<input type="file" id="fileInput" accept="image/*,application/pdf">

<!-- Settings -->
<div class="modal-backdrop" id="settingsModal">
    <div class="modal">
        <h2>Configurações</h2>
        <label>Microfone</label>
        <select id="audioDeviceSelect"></select>
        <label>Câmera</label>
        <select id="videoDeviceSelect"></select>
        <label>Formato da câmera</label>
        <select id="pipShapeSelect">
            <option value="rect">Retangular</option>
            <option value="circle">Circular</option>
        </select>
        <label>Modo somente caneta (rejeita toque de dedo)</label>
        <select id="penOnlySelect">
            <option value="false">Desativado</option>
            <option value="true">Ativado</option>
        </select>
        <div class="modal-actions">
            <button class="btn btn-ghost" data-close>Fechar</button>
        </div>
    </div>
</div>

<!-- Background -->
<div class="modal-backdrop" id="bgModal">
    <div class="modal">
        <h2>Fundo da lousa</h2>
        <div class="bg-options" id="bgOptions">
            <div class="bg-option active" data-bg="white" style="background:#fff">Branca</div>
            <div class="bg-option dark"   data-bg="green" style="background:#1f5641">Verde</div>
            <div class="bg-option"        data-bg="grid"
                 style="background:#fff;background-image:linear-gradient(#cfd8dc 1px,transparent 1px),linear-gradient(90deg,#cfd8dc 1px,transparent 1px);background-size:14px 14px">Quadriculada</div>
            <div class="bg-option"        data-bg="lined"
                 style="background:#fff;background-image:linear-gradient(#90caf9 1px,transparent 1px);background-size:100% 22px">Pautada</div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" data-close>Fechar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
(() => {
    'use strict';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    // DOM refs
    const board       = $('#board');
    const bgLayer     = $('#bgLayer');
    const drawLayer   = $('#drawLayer');
    const bgCtx       = bgLayer.getContext('2d', { willReadFrequently: true });
    const dCtx        = drawLayer.getContext('2d', { willReadFrequently: true });
    const textInput   = $('#textInput');
    const sizeSlider  = $('#sizeSlider');
    const colorPicker = $('#colorPicker');
    const cameraPip   = $('#cameraPip');
    const cameraVideo = $('#cameraVideo');

    // Sizes per tool (px at screen resolution; multiplied by dpr when drawing)
    const SIZES = { pen:4, pencil:3, highlighter:22, eraser:30, text:26, line:4, rect:4, circle:4, select:0 };
    const MAX_SIZES = { pen:80, pencil:80, highlighter:80, eraser:200, text:120, line:40, rect:40, circle:40, select:0 };
    const COLORS = ['#1a1a1a','#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1','#ffffff'];
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    // App state
    const S = {
        tool: 'pen',
        color: '#1a1a1a',
        sizes: { ...SIZES },
        bgPattern: 'white',
        penOnly: false,

        // Pages
        pages: [],
        currentPage: 0,

        // History
        history: [],
        redoStack: [],

        // Drawing
        isDrawing: false,
        startX: 0, startY: 0,
        baseSnapshot: null,
        strokePoints: [],
        strokeCanvas: null,
        strokeCtx: null,

        // Selection
        selection: null,

        // Media
        micEnabled: true,        // user intent: mic on or off
        cameraStream: null,      // active camera MediaStream
        audioStream: null,       // audio stream held during recording

        // Recording
        isRecording: false,
        mediaRecorder: null,
        recordedChunks: [],
        recordStartTime: 0,
        recordTimerInterval: null,
        compositorRunning: false,

        // Devices
        audioDeviceId: null,
        videoDeviceId: null,
    };

    // ─── TOAST ────────────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
        const el = $('#toast');
        el.textContent = msg;
        el.classList.add('visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('visible'), 2000);
    }

    // ─── PAGES ────────────────────────────────────────────────────────────────
    function createPage() {
        return { drawData: null, bgData: null, pdfDoc: null, pdfPageNum: 0 };
    }

    function savePage() {
        const p = S.pages[S.currentPage];
        if (!p) return;
        p.drawData = drawLayer.toDataURL('image/png');
        p.bgData   = bgLayer.toDataURL('image/png');
    }

    function loadPage(idx) {
        const p = S.pages[idx];
        if (!p) return;
        clearCtx(bgCtx); clearCtx(dCtx);
        paintBg();
        if (p.bgData)   loadImg(p.bgData,   img => bgCtx.drawImage(img, 0, 0, bgLayer.width, bgLayer.height));
        if (p.drawData) loadImg(p.drawData,  img => dCtx.drawImage(img, 0, 0, drawLayer.width, drawLayer.height));
        S.history = []; S.redoStack = [];
        updatePageLabel();
    }

    function loadImg(src, cb) {
        const img = new Image(); img.onload = () => cb(img); img.src = src;
    }

    function updatePageLabel() {
        const txt = `${S.currentPage + 1} / ${S.pages.length}`;
        $('#pageLabel').textContent = txt;
        $('#pageLabelFs').textContent = txt;
        $('#prevPageBtn').disabled = S.currentPage === 0;
        $('#nextPageBtn').disabled = S.currentPage === S.pages.length - 1;
    }

    function addPage()  { savePage(); S.pages.push(createPage()); S.currentPage = S.pages.length - 1; clearCtx(bgCtx); clearCtx(dCtx); paintBg(); updatePageLabel(); toast('Nova página'); }
    function prevPage() { if (S.currentPage <= 0) return; savePage(); S.currentPage--; loadPage(S.currentPage); }
    function nextPage() { if (S.currentPage >= S.pages.length - 1) return; savePage(); S.currentPage++; loadPage(S.currentPage); }

    // ─── CANVAS ───────────────────────────────────────────────────────────────
    function clearCtx(ctx) { ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height); }

    function paintBg() {
        const w = bgLayer.width, h = bgLayer.height;
        clearCtx(bgCtx);
        if (S.bgPattern === 'green') { board.classList.add('theme-green'); return; }
        board.classList.remove('theme-green');
        if (S.bgPattern === 'grid') {
            bgCtx.strokeStyle = '#cfd8dc'; bgCtx.lineWidth = 1;
            const step = 28 * DPR;
            for (let x = step; x < w; x += step) { bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,h); bgCtx.stroke(); }
            for (let y = step; y < h; y += step) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }
        } else if (S.bgPattern === 'lined') {
            bgCtx.strokeStyle = '#90caf9'; bgCtx.lineWidth = 1;
            const step = 44 * DPR;
            for (let y = step; y < h; y += step) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }
        }
    }

    function resizeCanvas() {
        const rect = board.getBoundingClientRect();
        savePage();
        [bgLayer, drawLayer].forEach(c => {
            c.width  = Math.max(1, Math.floor(rect.width  * DPR));
            c.height = Math.max(1, Math.floor(rect.height * DPR));
        });
        bgCtx.setTransform(1,0,0,1,0,0);
        dCtx.setTransform(1,0,0,1,0,0);
        loadPage(S.currentPage);
    }

    // ─── HISTORY ──────────────────────────────────────────────────────────────
    function pushHistory() {
        try {
            S.history.push(drawLayer.toDataURL('image/png'));
            if (S.history.length > 30) S.history.shift();
            S.redoStack = [];
        } catch(e) {}
    }

    function undo() {
        if (!S.history.length) return;
        S.redoStack.push(drawLayer.toDataURL('image/png'));
        loadImg(S.history.pop(), img => { clearCtx(dCtx); dCtx.drawImage(img, 0, 0); });
    }

    function redo() {
        if (!S.redoStack.length) return;
        S.history.push(drawLayer.toDataURL('image/png'));
        loadImg(S.redoStack.pop(), img => { clearCtx(dCtx); dCtx.drawImage(img, 0, 0); });
    }

    // ─── STROKE BUFFER ────────────────────────────────────────────────────────
    function getStrokeBuf() {
        if (!S.strokeCanvas) {
            S.strokeCanvas = document.createElement('canvas');
            S.strokeCtx    = S.strokeCanvas.getContext('2d');
        }
        if (S.strokeCanvas.width !== drawLayer.width || S.strokeCanvas.height !== drawLayer.height) {
            S.strokeCanvas.width  = drawLayer.width;
            S.strokeCanvas.height = drawLayer.height;
        }
        return S.strokeCtx;
    }

    function renderStroke() {
        const ctx  = getStrokeBuf();
        const pts  = S.strokePoints;
        const size = S.sizes[S.tool] * DPR;
        ctx.clearRect(0, 0, S.strokeCanvas.width, S.strokeCanvas.height);
        if (!pts.length) return;

        const isEraser = S.tool === 'eraser';
        ctx.strokeStyle = isEraser ? '#000' : S.color;
        ctx.fillStyle   = isEraser ? '#000' : S.color;
        ctx.lineCap     = S.tool === 'highlighter' ? 'butt' : 'round';
        ctx.lineJoin    = 'round';

        if (pts.length === 1) {
            const r = (S.tool === 'pen' ? size * (0.6 + pts[0].p * 0.8) : size) / 2;
            ctx.beginPath(); ctx.arc(pts[0].x, pts[0].y, r, 0, Math.PI * 2); ctx.fill();
            return;
        }

        if (S.tool === 'pen') {
            for (let i = 1; i < pts.length; i++) {
                const p0 = pts[i-1], p1 = pts[i];
                ctx.lineWidth = size * (0.6 + ((p0.p + p1.p) / 2) * 0.8);
                ctx.beginPath();
                if (i === 1) {
                    ctx.moveTo(p0.x, p0.y);
                } else {
                    const pm = pts[i-2];
                    ctx.moveTo((pm.x + p0.x)/2, (pm.y + p0.y)/2);
                }
                if (i < pts.length - 1) {
                    ctx.quadraticCurveTo(p0.x, p0.y, (p0.x+p1.x)/2, (p0.y+p1.y)/2);
                } else {
                    ctx.quadraticCurveTo(p0.x, p0.y, p1.x, p1.y);
                }
                ctx.stroke();
            }
        } else {
            ctx.lineWidth = size;
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length - 1; i++) {
                ctx.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x+pts[i+1].x)/2, (pts[i].y+pts[i+1].y)/2);
            }
            ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
            ctx.stroke();

            if (S.tool === 'pencil') {
                ctx.save(); ctx.globalAlpha = 0.35;
                for (let pass = 0; pass < 2; pass++) {
                    ctx.beginPath();
                    ctx.moveTo(pts[0].x + (Math.random()-.5), pts[0].y + (Math.random()-.5));
                    for (let i = 1; i < pts.length; i++)
                        ctx.lineTo(pts[i].x + (Math.random()-.5)*1.5, pts[i].y + (Math.random()-.5)*1.5);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }
    }

    function compositeStroke() {
        dCtx.putImageData(S.baseSnapshot, 0, 0);
        dCtx.save();
        if      (S.tool === 'highlighter') { dCtx.globalAlpha = 0.35; dCtx.globalCompositeOperation = 'multiply'; }
        else if (S.tool === 'pencil')      { dCtx.globalAlpha = 0.85; }
        else if (S.tool === 'eraser')      { dCtx.globalCompositeOperation = 'destination-out'; }
        dCtx.drawImage(S.strokeCanvas, 0, 0);
        dCtx.restore();
    }

    // ─── POINTER EVENTS ───────────────────────────────────────────────────────
    function getPos(e) {
        const r = drawLayer.getBoundingClientRect();
        return {
            x: (e.clientX - r.left) * DPR,
            y: (e.clientY - r.top)  * DPR,
            p: e.pressure ?? 0.5,
        };
    }

    function onPointerDown(e) {
        if (S.penOnly && e.pointerType === 'touch') return;
        if (e.button && e.button !== 0) return;
        e.preventDefault();
        drawLayer.setPointerCapture(e.pointerId);
        const pos = getPos(e);

        if (S.tool === 'text')   { showTextInput(pos); return; }
        if (S.tool === 'select') { selDown(pos); return; }

        pushHistory();
        S.isDrawing    = true;
        S.startX       = pos.x; S.startY = pos.y;
        S.baseSnapshot = dCtx.getImageData(0, 0, drawLayer.width, drawLayer.height);

        if (['pen','pencil','highlighter','eraser'].includes(S.tool)) {
            S.strokePoints = [{ x:pos.x, y:pos.y, p:pos.p }];
            getStrokeBuf();
            renderStroke();
            compositeStroke();
        }
    }

    function onPointerMove(e) {
        if (S.tool === 'select' && S.selection) { selMove(e); return; }
        if (!S.isDrawing) return;
        if (S.penOnly && e.pointerType === 'touch') return;
        e.preventDefault();

        const evts = e.getCoalescedEvents ? (e.getCoalescedEvents() || [e]) : [e];
        const pos  = getPos(e);

        if (['pen','pencil','highlighter','eraser'].includes(S.tool)) {
            for (const ev of evts) {
                const p = getPos(ev);
                const last = S.strokePoints[S.strokePoints.length - 1];
                if (!last || Math.hypot(p.x - last.x, p.y - last.y) > 0.5)
                    S.strokePoints.push({ x:p.x, y:p.y, p:p.p });
            }
            renderStroke();
            compositeStroke();
        } else if (['line','rect','circle'].includes(S.tool)) {
            dCtx.putImageData(S.baseSnapshot, 0, 0);
            dCtx.lineCap = dCtx.lineJoin = 'round';
            dCtx.lineWidth   = S.sizes[S.tool] * DPR;
            dCtx.strokeStyle = S.color;
            dCtx.beginPath();
            if (S.tool === 'line') {
                dCtx.moveTo(S.startX, S.startY); dCtx.lineTo(pos.x, pos.y); dCtx.stroke();
            } else if (S.tool === 'rect') {
                dCtx.strokeRect(S.startX, S.startY, pos.x - S.startX, pos.y - S.startY);
            } else {
                dCtx.arc(S.startX, S.startY, Math.hypot(pos.x-S.startX, pos.y-S.startY), 0, Math.PI*2);
                dCtx.stroke();
            }
        }
    }

    function onPointerUp(e) {
        if (S.tool === 'select') { selUp(e); return; }
        if (!S.isDrawing) return;
        S.isDrawing    = false;
        S.strokePoints = [];
        S.baseSnapshot = null;
        dCtx.globalAlpha = 1;
        dCtx.globalCompositeOperation = 'source-over';
        try { drawLayer.releasePointerCapture(e.pointerId); } catch(_) {}
    }

    // ─── SELECTION ────────────────────────────────────────────────────────────
    function selDown(pos) {
        const s = S.selection;
        if (s && s.committed) {
            if (pos.x >= s.x && pos.x <= s.x+s.w && pos.y >= s.y && pos.y <= s.y+s.h) {
                s.dragging = true;
                s.dragOX = pos.x - s.x; s.dragOY = pos.y - s.y;
                return;
            }
            commitSel();
        }
        pushHistory();
        S.baseSnapshot = dCtx.getImageData(0, 0, drawLayer.width, drawLayer.height);
        S.selection = { startX:pos.x, startY:pos.y, x:pos.x, y:pos.y, w:0, h:0, committed:false, dragging:false, imgData:null };
    }

    function selMove(e) {
        const pos = getPos(e); const s = S.selection;
        if (!s) return;
        e.preventDefault();
        if (s.committed) {
            if (!s.dragging) return;
            s.x = pos.x - s.dragOX; s.y = pos.y - s.dragOY;
            drawSelOverlay();
        } else {
            s.x = Math.min(s.startX, pos.x); s.y = Math.min(s.startY, pos.y);
            s.w = Math.abs(pos.x - s.startX); s.h = Math.abs(pos.y - s.startY);
            dCtx.putImageData(S.baseSnapshot, 0, 0);
            dCtx.save(); dCtx.setLineDash([8,6]); dCtx.lineWidth = 2; dCtx.strokeStyle = '#1a73e8';
            dCtx.strokeRect(s.x, s.y, s.w, s.h); dCtx.restore();
        }
    }

    function selUp(e) {
        const s = S.selection;
        if (!s) return;
        if (s.dragging) { s.dragging = false; return; }
        if (s.committed) return;
        if (s.w < 8 || s.h < 8) { S.selection = null; if (S.baseSnapshot) dCtx.putImageData(S.baseSnapshot, 0, 0); return; }
        dCtx.putImageData(S.baseSnapshot, 0, 0);
        s.imgData = dCtx.getImageData(s.x, s.y, s.w, s.h);
        dCtx.clearRect(s.x, s.y, s.w, s.h);
        S.baseSnapshot = dCtx.getImageData(0, 0, drawLayer.width, drawLayer.height);
        s.committed = true;
        drawSelOverlay();
        try { drawLayer.releasePointerCapture(e.pointerId); } catch(_) {}
    }

    function drawSelOverlay() {
        const s = S.selection;
        if (!s || !s.committed) return;
        dCtx.putImageData(S.baseSnapshot, 0, 0);
        const tmp = document.createElement('canvas');
        tmp.width = s.imgData.width; tmp.height = s.imgData.height;
        tmp.getContext('2d').putImageData(s.imgData, 0, 0);
        dCtx.drawImage(tmp, s.x, s.y);
        dCtx.save(); dCtx.setLineDash([8,6]); dCtx.lineWidth = 2; dCtx.strokeStyle = '#1a73e8';
        dCtx.strokeRect(s.x, s.y, s.w, s.h); dCtx.restore();
    }

    function commitSel() {
        const s = S.selection;
        if (!s || !s.committed) { S.selection = null; return; }
        dCtx.putImageData(S.baseSnapshot, 0, 0);
        const tmp = document.createElement('canvas');
        tmp.width = s.imgData.width; tmp.height = s.imgData.height;
        tmp.getContext('2d').putImageData(s.imgData, 0, 0);
        dCtx.drawImage(tmp, s.x, s.y);
        S.selection = null; S.baseSnapshot = null;
    }

    // ─── TEXT TOOL ────────────────────────────────────────────────────────────
    function showTextInput(pos) {
        textInput.style.display = 'block';
        textInput.style.left    = (pos.x / DPR) + 'px';
        textInput.style.top     = (pos.y / DPR - S.sizes.text / 2) + 'px';
        textInput.style.fontSize = S.sizes.text + 'px';
        textInput.style.color    = S.color;
        textInput.value = '';
        textInput.dataset.x = pos.x; textInput.dataset.y = pos.y;
        setTimeout(() => textInput.focus(), 10);
    }

    textInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (textInput.value.trim()) {
                pushHistory();
                dCtx.font         = `500 ${S.sizes.text * DPR}px Inter, sans-serif`;
                dCtx.fillStyle    = S.color;
                dCtx.textBaseline = 'middle';
                dCtx.fillText(textInput.value, parseFloat(textInput.dataset.x), parseFloat(textInput.dataset.y));
            }
            textInput.style.display = 'none'; textInput.value = '';
        } else if (e.key === 'Escape') {
            textInput.style.display = 'none'; textInput.value = '';
        }
    });

    // ─── TOOLS UI ─────────────────────────────────────────────────────────────
    function setTool(name) {
        if (S.selection && S.selection.committed) commitSel();
        S.tool = name;
        $$('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === name));
        sizeSlider.max   = MAX_SIZES[name] || 80;
        sizeSlider.value = S.sizes[name]   || 4;
        if (name !== 'text') { textInput.style.display = 'none'; }
    }

    $$('.tool-btn[data-tool]').forEach(btn =>
        btn.addEventListener('click', () => setTool(btn.dataset.tool))
    );

    sizeSlider.addEventListener('input', () => {
        S.sizes[S.tool] = parseInt(sizeSlider.value, 10);
        if (S.tool === 'text') textInput.style.fontSize = S.sizes.text + 'px';
    });

    colorPicker.addEventListener('input', e => { S.color = e.target.value; syncChips(); });

    function buildChips() {
        const wrap = $('#colorPresets');
        wrap.innerHTML = '';
        COLORS.forEach(c => {
            const el = document.createElement('div');
            el.className = 'color-chip';
            el.style.background = c;
            if (c === '#ffffff') el.style.boxShadow = 'inset 0 0 0 1px rgba(0,0,0,0.15)';
            el.addEventListener('click', () => { S.color = c; colorPicker.value = c; syncChips(); });
            wrap.appendChild(el);
        });
        syncChips();
    }
    function syncChips() {
        $$('#colorPresets .color-chip').forEach((el,i) => el.classList.toggle('sel', COLORS[i] === S.color));
    }

    // ─── UNDO / REDO / CLEAR ──────────────────────────────────────────────────
    $('#undoBtn').addEventListener('click', undo);
    $('#redoBtn').addEventListener('click', redo);
    $('#clearBtn').addEventListener('click', () => { pushHistory(); clearCtx(dCtx); toast('Página limpa'); });

    // ─── IMPORT / EXPORT ──────────────────────────────────────────────────────
    $('#importBtn').addEventListener('click', () => $('#fileInput').click());
    $('#fileInput').addEventListener('change', async e => {
        const file = e.target.files[0]; if (!file) return;
        if (file.type === 'application/pdf') await importPdf(file);
        else if (file.type.startsWith('image/')) importImage(file);
        e.target.value = '';
    });

    function importImage(file) {
        const url = URL.createObjectURL(file);
        loadImg(url, img => {
            savePage();
            S.pages.push(createPage()); S.currentPage = S.pages.length - 1;
            clearCtx(bgCtx); clearCtx(dCtx); paintBg();
            const w = bgCtx.canvas.width, h = bgCtx.canvas.height;
            const ar = img.width/img.height, car = w/h;
            const [dw,dh] = ar>car ? [w, w/ar] : [h*ar, h];
            bgCtx.drawImage(img, (w-dw)/2, (h-dh)/2, dw, dh);
            savePage(); updatePageLabel(); toast('Imagem carregada');
        });
    }

    async function importPdf(file) {
        try {
            const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
            savePage();
            const base = S.pages.length;
            for (let i = 0; i < pdf.numPages; i++) {
                const p = createPage(); p.pdfDoc = pdf; p.pdfPageNum = i + 1;
                S.pages.push(p);
            }
            S.currentPage = base;
            await renderPdfPage();
            updatePageLabel();
            toast(`PDF: ${pdf.numPages} página(s)`);
        } catch(err) { toast('Erro ao abrir PDF'); console.error(err); }
    }

    async function renderPdfPage() {
        const p = S.pages[S.currentPage];
        if (!p || !p.pdfDoc) return;
        const page = await p.pdfDoc.getPage(p.pdfPageNum);
        const w = bgLayer.width, h = bgLayer.height;
        const vp0   = page.getViewport({ scale:1 });
        const scale = Math.min(w/vp0.width, h/vp0.height);
        const vp    = page.getViewport({ scale });
        clearCtx(bgCtx); paintBg();
        bgCtx.save(); bgCtx.translate((w-vp.width)/2, (h-vp.height)/2);
        await page.render({ canvasContext:bgCtx, viewport:vp }).promise;
        bgCtx.restore();
        p.bgData = bgLayer.toDataURL('image/png');
    }

    $('#exportBtn').addEventListener('click', () => {
        const out = document.createElement('canvas');
        out.width = drawLayer.width; out.height = drawLayer.height;
        const oc = out.getContext('2d');
        oc.fillStyle = S.bgPattern === 'green' ? '#1f5641' : '#ffffff';
        oc.fillRect(0, 0, out.width, out.height);
        oc.drawImage(bgLayer, 0, 0); oc.drawImage(drawLayer, 0, 0);
        out.toBlob(blob => {
            const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(blob),
                download: `lousa_p${S.currentPage+1}_${Date.now()}.png`,
            });
            a.click(); URL.revokeObjectURL(a.href); toast('Imagem exportada');
        });
    });

    // ─── MICROPHONE ───────────────────────────────────────────────────────────
    function updateMicUI() {
        const btn  = $('#micBtn');
        const icon = btn.querySelector('.material-symbols-rounded');
        if (S.micEnabled) {
            btn.classList.add('active'); icon.textContent = 'mic';
        } else {
            btn.classList.remove('active'); icon.textContent = 'mic_off';
        }
        // If recording, instantly mute/unmute the live audio track
        if (S.audioStream) {
            S.audioStream.getAudioTracks().forEach(t => { t.enabled = S.micEnabled; });
        }
        toast(S.micEnabled ? 'Microfone ativado' : 'Microfone silenciado');
    }

    $('#micBtn').addEventListener('click', () => { S.micEnabled = !S.micEnabled; updateMicUI(); });

    // ─── CAMERA ───────────────────────────────────────────────────────────────
    async function toggleCamera() {
        if (S.cameraStream) {
            S.cameraStream.getTracks().forEach(t => t.stop());
            S.cameraStream = null;
            cameraVideo.srcObject = null;
            cameraPip.style.display = 'none';
            $('#cameraBtn').classList.remove('active');
            toast('Câmera desativada');
        } else {
            try {
                const constraints = {
                    video: S.videoDeviceId ? { deviceId:{ exact:S.videoDeviceId } } : { facingMode:'user' },
                    audio: false,
                };
                S.cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraVideo.srcObject = S.cameraStream;
                cameraPip.style.display = 'block';
                $('#cameraBtn').classList.add('active');
                await refreshDevices();
                toast('Câmera ativada');
            } catch(err) { toast('Sem acesso à câmera'); console.error(err); }
        }
    }
    $('#cameraBtn').addEventListener('click', toggleCamera);

    // PiP drag & resize
    (() => {
        let mode = null, ox=0, oy=0, sw=0, sh=0, sx=0, sy=0;
        cameraPip.addEventListener('pointerdown', e => {
            mode = e.target === $('#pipHandle') ? 'resize' : 'drag';
            if (mode === 'resize') { sw=cameraPip.offsetWidth; sh=cameraPip.offsetHeight; sx=e.clientX; sy=e.clientY; }
            else { cameraPip.classList.add('dragging'); const r=cameraPip.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top; }
            cameraPip.setPointerCapture(e.pointerId); e.preventDefault();
        });
        cameraPip.addEventListener('pointermove', e => {
            const fr = $('#board-frame').getBoundingClientRect();
            if (mode === 'drag') {
                let nx = Math.max(0, Math.min(fr.width  - cameraPip.offsetWidth,  e.clientX - fr.left - ox));
                let ny = Math.max(0, Math.min(fr.height - cameraPip.offsetHeight, e.clientY - fr.top  - oy));
                cameraPip.style.left = nx+'px'; cameraPip.style.top = ny+'px'; cameraPip.style.right = 'auto';
            } else if (mode === 'resize') {
                cameraPip.style.width  = Math.max(120, Math.min(600, sw+(e.clientX-sx)))+'px';
                if (!cameraPip.classList.contains('shape-circle'))
                    cameraPip.style.height = Math.max(90, Math.min(450, sh+(e.clientY-sy)))+'px';
            }
        });
        cameraPip.addEventListener('pointerup', e => {
            mode = null; cameraPip.classList.remove('dragging');
            try { cameraPip.releasePointerCapture(e.pointerId); } catch(_) {}
        });
    })();

    // ─── DEVICES ──────────────────────────────────────────────────────────────
    async function refreshDevices() {
        try {
            const devs   = await navigator.mediaDevices.enumerateDevices();
            const audios = devs.filter(d => d.kind === 'audioinput');
            const videos = devs.filter(d => d.kind === 'videoinput');
            const asel   = $('#audioDeviceSelect');
            const vsel   = $('#videoDeviceSelect');
            asel.innerHTML = ''; vsel.innerHTML = '';
            audios.forEach((d,i) => { const o=document.createElement('option'); o.value=d.deviceId; o.textContent=d.label||`Microfone ${i+1}`; asel.appendChild(o); });
            videos.forEach((d,i) => { const o=document.createElement('option'); o.value=d.deviceId; o.textContent=d.label||`Câmera ${i+1}`;    vsel.appendChild(o); });
            if (S.audioDeviceId) asel.value = S.audioDeviceId;
            if (S.videoDeviceId) vsel.value = S.videoDeviceId;
        } catch(e) { console.warn(e); }
    }

    $('#audioDeviceSelect').addEventListener('change', e => { S.audioDeviceId = e.target.value; });
    $('#videoDeviceSelect').addEventListener('change', async e => {
        S.videoDeviceId = e.target.value;
        if (S.cameraStream) { await toggleCamera(); await toggleCamera(); }
    });
    $('#pipShapeSelect').addEventListener('change',  e => { cameraPip.classList.toggle('shape-circle', e.target.value === 'circle'); });
    $('#penOnlySelect').addEventListener('change',   e => { S.penOnly = e.target.value === 'true'; toast(S.penOnly ? 'Modo caneta ativado' : 'Modo caneta desativado'); });

    // ─── RECORDING ────────────────────────────────────────────────────────────
    function roundRect(ctx,x,y,w,h,r) {
        ctx.beginPath();
        ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
        ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
    }

    async function startRecording() {
        try {
            const audioConstraints = S.audioDeviceId
                ? { deviceId:{ exact:S.audioDeviceId } } : true;
            S.audioStream = await navigator.mediaDevices.getUserMedia({ audio:audioConstraints });
            // Respect current mic state immediately
            S.audioStream.getAudioTracks().forEach(t => { t.enabled = S.micEnabled; });
            updateMicUI();
            await refreshDevices();

            // Compositor canvas
            const out  = document.createElement('canvas');
            out.width  = drawLayer.width; out.height = drawLayer.height;
            const octx = out.getContext('2d');
            S.compositorRunning = true;

            const loop = () => {
                if (!S.compositorRunning) return;
                octx.fillStyle = S.bgPattern === 'green' ? '#1f5641' : '#ffffff';
                octx.fillRect(0, 0, out.width, out.height);
                octx.drawImage(bgLayer, 0, 0);
                octx.drawImage(drawLayer, 0, 0);
                if (S.cameraStream && cameraVideo.videoWidth) {
                    const br  = board.getBoundingClientRect();
                    const pr  = cameraPip.getBoundingClientRect();
                    const px  = (pr.left - br.left) * DPR, py  = (pr.top - br.top) * DPR;
                    const pw  = pr.width * DPR,             ph  = pr.height * DPR;
                    octx.save();
                    if (cameraPip.classList.contains('shape-circle')) {
                        octx.beginPath(); octx.arc(px+pw/2, py+ph/2, pw/2, 0, Math.PI*2); octx.clip();
                    } else { roundRect(octx, px, py, pw, ph, 14*DPR); octx.clip(); }
                    octx.translate(px+pw, py); octx.scale(-1,1);
                    octx.drawImage(cameraVideo, 0, 0, pw, ph);
                    octx.restore();
                    octx.lineWidth   = 3*DPR;
                    octx.strokeStyle = 'rgba(255,255,255,0.95)';
                    if (cameraPip.classList.contains('shape-circle')) {
                        octx.beginPath(); octx.arc(px+pw/2, py+ph/2, pw/2-1.5*DPR, 0, Math.PI*2); octx.stroke();
                    } else { roundRect(octx, px, py, pw, ph, 14*DPR); octx.stroke(); }
                }
                requestAnimationFrame(loop);
            };
            loop();

            const vStream = out.captureStream(30);
            vStream.addTrack(S.audioStream.getAudioTracks()[0]);

            let mime = 'video/webm;codecs=vp9,opus';
            if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8,opus';
            if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';

            S.recordedChunks = [];
            S.mediaRecorder   = new MediaRecorder(vStream, { mimeType:mime, videoBitsPerSecond:4_000_000 });
            S.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) S.recordedChunks.push(e.data); };
            S.mediaRecorder.onstop = () => {
                const blob = new Blob(S.recordedChunks, { type:'video/webm' });
                const a    = Object.assign(document.createElement('a'), {
                    href: URL.createObjectURL(blob),
                    download: `aula_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.webm`,
                });
                a.click(); URL.revokeObjectURL(a.href); S.recordedChunks = [];
            };
            S.mediaRecorder.start(1000);

            S.isRecording = true; S.recordStartTime = Date.now();
            $('#recordBtn').classList.add('recording'); $('#recordIcon').textContent = 'stop';
            $('#recTimer').classList.add('visible');
            S.recordTimerInterval = setInterval(() => {
                const sec = Math.floor((Date.now()-S.recordStartTime)/1000);
                $('#recTime').textContent = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
            }, 500);
            toast('Gravando aula…');
        } catch(err) { toast('Erro ao iniciar gravação'); console.error(err); }
    }

    function stopRecording() {
        if (S.mediaRecorder && S.mediaRecorder.state !== 'inactive') S.mediaRecorder.stop();
        if (S.audioStream) { S.audioStream.getTracks().forEach(t => t.stop()); S.audioStream = null; }
        S.compositorRunning = false; S.isRecording = false;
        clearInterval(S.recordTimerInterval);
        $('#recordBtn').classList.remove('recording'); $('#recordIcon').textContent = 'fiber_manual_record';
        $('#recTimer').classList.remove('visible');
        toast('Gravação salva');
    }

    $('#recordBtn').addEventListener('click', () => S.isRecording ? stopRecording() : startRecording());

    // ─── FULLSCREEN ───────────────────────────────────────────────────────────
    $('#fsBtn').addEventListener('click', async () => {
        if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen().catch(()=>{});
            document.body.classList.add('fullscreen');
            $('#fsBtn').querySelector('.material-symbols-rounded').textContent = 'fullscreen_exit';
        } else {
            await document.exitFullscreen().catch(()=>{});
            document.body.classList.remove('fullscreen');
            $('#fsBtn').querySelector('.material-symbols-rounded').textContent = 'fullscreen';
        }
        setTimeout(resizeCanvas, 200);
    });
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            document.body.classList.remove('fullscreen');
            $('#fsBtn').querySelector('.material-symbols-rounded').textContent = 'fullscreen';
            setTimeout(resizeCanvas, 200);
        }
    });

    // ─── MODALS ───────────────────────────────────────────────────────────────
    $('#settingsBtn').addEventListener('click', async () => { await refreshDevices(); $('#settingsModal').classList.add('visible'); });
    $('#bgBtn').addEventListener('click', () => $('#bgModal').classList.add('visible'));
    $$('[data-close]').forEach(b => b.addEventListener('click', () => $$('.modal-backdrop').forEach(m => m.classList.remove('visible'))));
    $$('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if (e.target===m) m.classList.remove('visible'); }));

    $$('#bgOptions .bg-option').forEach(opt => opt.addEventListener('click', () => {
        $$('#bgOptions .bg-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        S.bgPattern = opt.dataset.bg;
        if (S.bgPattern === 'green') { S.color = '#ffffff'; colorPicker.value = '#ffffff'; syncChips(); }
        paintBg(); setTimeout(() => $('#bgModal').classList.remove('visible'), 250);
    }));

    // ─── PAGE NAV ─────────────────────────────────────────────────────────────
    $('#prevPageBtn').addEventListener('click', prevPage);
    $('#nextPageBtn').addEventListener('click', nextPage);
    $('#addPageBtn').addEventListener('click', addPage);

    document.addEventListener('keydown', e => {
        if (textInput.style.display === 'block') return;
        if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
        if ((e.ctrlKey||e.metaKey) && e.key==='y') { e.preventDefault(); redo(); }
        if (e.altKey && e.key==='ArrowLeft')  prevPage();
        if (e.altKey && e.key==='ArrowRight') nextPage();
        if (e.key==='F11') { e.preventDefault(); $('#fsBtn').click(); }
    });

    // ─── POINTER BIND ─────────────────────────────────────────────────────────
    drawLayer.addEventListener('pointerdown',  onPointerDown);
    drawLayer.addEventListener('pointermove',  onPointerMove);
    drawLayer.addEventListener('pointerup',    onPointerUp);
    drawLayer.addEventListener('pointercancel',onPointerUp);

    // ─── INIT ─────────────────────────────────────────────────────────────────
    buildChips();
    updateMicUI();
    sizeSlider.max   = MAX_SIZES[S.tool];
    sizeSlider.value = S.sizes[S.tool];
    S.pages.push(createPage());
    resizeCanvas();
    updatePageLabel();
    window.addEventListener('resize', resizeCanvas);
    refreshDevices();
    navigator.mediaDevices.addEventListener?.('devicechange', refreshDevices);
    window.app = { prevPage, nextPage, addPage };

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
})();
</script>
</body>
</html>
